<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" width="100%" height="100%" style="background-color:#fcf8f2; font-family:'Press Start 2P', monospace; font-size:10px;">
  <!-- Styling -->
  <style>
    .chunky-box { fill: #fffef9; stroke: #2c1a1a; stroke-width: 4px; filter: drop-shadow(4px 4px 0px #2c1a1a); }
    .header-box { fill: #ffd166; stroke: #2c1a1a; stroke-width: 3px; }
    .conn-arrow { fill: none; stroke: #2c1a1a; stroke-width: 3px; stroke-dasharray: 6 4; }
    .solid-arrow { fill: none; stroke: #2c1a1a; stroke-width: 3px; }
    .label-text { font-family: 'VT323', monospace; font-size: 14px; fill: #2c1a1a; }
    .title-text { font-family: 'Press Start 2P', monospace; font-size: 9px; fill: #2c1a1a; }
    .ai-box { fill: #ef476f; stroke: #2c1a1a; stroke-width: 3px; }
  </style>

  <!-- Title -->
  <text x="30" y="35" font-family="'Press Start 2P'" font-size="16" font-weight="bold" fill="#2c1a1a">SYSTEM FLOW DIAGRAM</text>
  <text x="30" y="55" font-family="'VT323'" font-size="16" fill="#5e4b4b">THE BIG BOSS IDEA - DATA FLOW &amp; INTEGRATION PROTOCOL</text>

  <!-- ==================== 1. DEVICES LAYER ==================== -->
  <g transform="translate(30, 80)">
    <rect class="chunky-box" width="200" height="120" />
    <rect class="header-box" x="0" y="0" width="200" height="24" />
    <text class="title-text" x="10" y="16">SIMULATED DEVICES</text>
    
    <text class="label-text" x="15" y="50">3 Rooms (Drawing, Work 1, 2)</text>
    <text class="label-text" x="15" y="70">• 6 Fans (60W when ON)</text>
    <text class="label-text" x="15" y="90">• 9 Lights (15W when ON)</text>
  </g>

  <!-- ==================== 2. DATABASE LAYER ==================== -->
  <g transform="translate(30, 310)">
    <rect class="chunky-box" width="200" height="120" />
    <rect class="header-box" x="0" y="0" width="200" height="24" fill="#3ab09e" />
    <text class="title-text" x="10" y="16" fill="white">NEON POSTGRES (DB)</text>
    
    <text class="label-text" x="15" y="55">Prisma ORM Client Schema</text>
    <text class="label-text" x="15" y="75">Table: Device</text>
    <text class="label-text" x="15" y="95">- status / powerDraw</text>
    <text class="label-text" x="15" y="110">- lastChanged timestamp</text>
  </g>

  <!-- ==================== 3. EXPRESS BACKEND ==================== -->
  <g transform="translate(320, 180)">
    <rect class="chunky-box" width="220" height="180" />
    <rect class="header-box" x="0" y="0" width="220" height="24" fill="#ef476f" />
    <text class="title-text" x="10" y="16" fill="white">EXPRESS SERVER</text>
    
    <!-- Loop & Handlers -->
    <text class="label-text" x="15" y="50" font-weight="bold">⚙️ Simulator Loop (5-15s)</text>
    <text class="label-text" x="15" y="70">├─ Randomly toggles 0-2 devices</text>
    <text class="label-text" x="15" y="90">└─ Commits changes to DB</text>
    
    <text class="label-text" x="15" y="120" font-weight="bold">📡 REST &amp; SSE Stream Server</text>
    <text class="label-text" x="15" y="140">├─ GET /devices, /usage, /alerts</text>
    <text class="label-text" x="15" y="160">└─ EventStream /api/stream</text>
  </g>

  <!-- ==================== 4. WEB DASHBOARD ==================== -->
  <g transform="translate(620, 50)">
    <rect class="chunky-box" width="200" height="120" />
    <rect class="header-box" x="0" y="0" width="200" height="24" fill="#ffcb05" />
    <text class="title-text" x="10" y="16">NEXT.JS DASHBOARD</text>
    
    <text class="label-text" x="15" y="50">Real-time Visuals UI</text>
    <text class="label-text" x="15" y="70">• EventSource Client Sync</text>
    <text class="label-text" x="15" y="90">• Top-Down SVG Layout</text>
    <text class="label-text" x="15" y="110">• Interactive Switchboard</text>
  </g>

  <!-- ==================== 5. DISCORD BOT ==================== -->
  <g transform="translate(620, 210)">
    <rect class="chunky-box" width="200" height="120" />
    <rect class="header-box" x="0" y="0" width="200" height="24" fill="#7289da" />
    <text class="title-text" x="10" y="16" fill="white">DISCORD.JS BOT</text>
    
    <text class="label-text" x="15" y="50">Interactive Command bot</text>
    <text class="label-text" x="15" y="70">• Commands: !status, !usage</text>
    <text class="label-text" x="15" y="90">• Room Query: !room &lt;name&gt;</text>
    <text class="label-text" x="15" y="110">• Conversational AI replies</text>
  </g>

  <!-- ==================== 6. GEMINI AI MODULE ==================== -->
  <g transform="translate(320, 410)">
    <rect class="chunky-box" width="220" height="70" />
    <rect class="header-box" x="0" y="0" width="220" height="20" fill="#a89f91" />
    <text class="title-text" x="10" y="14">GEMINI AI SDK</text>
    
    <text class="label-text" x="15" y="40">Translates JSON energy logs</text>
    <text class="label-text" x="15" y="55">into quirky, opinionated replies.</text>
  </g>

  <!-- ==================== CONNECTIONS / ARROWS ==================== -->
  <!-- 1. Devices -> Express Server (Simulation Trigger) -->
  <path class="conn-arrow" d="M 130 200 L 130 240 L 320 240" />
  <text class="label-text" x="145" y="235">1. State Change</text>

  <!-- 2. Express Server -> Prisma -> DB -->
  <path class="solid-arrow" d="M 360 360 L 360 380 Q 360 400 340 400 L 230 400" />
  <path class="solid-arrow" d="M 230 400 L 240 395 M 230 400 L 240 405" /> <!-- Arrowhead left -->
  <path class="solid-arrow" d="M 230 370 L 320 370" />
  <path class="solid-arrow" d="M 320 370 L 310 365 M 320 370 L 310 375" /> <!-- Arrowhead right -->
  <text class="label-text" x="235" y="365">Prisma Reads</text>
  <text class="label-text" x="235" y="395">Prisma Writes</text>

  <!-- 3. Express Server -> SSE Stream -> Next.js -->
  <path class="solid-arrow" d="M 490 180 L 490 110 L 620 110" />
  <path class="solid-arrow" d="M 620 110 L 610 105 M 620 110 L 610 115" /> <!-- Arrowhead -->
  <text class="label-text" x="500" y="105">SSE EventStream</text>

  <!-- 4. Next.js -> REST Toggle -> Express -->
  <path class="solid-arrow" d="M 620 135 L 520 135 L 520 180" />
  <path class="solid-arrow" d="M 520 180 L 515 170 M 520 180 L 525 170" /> <!-- Arrowhead -->
  <text class="label-text" x="525" y="130">HTTP POST (Toggle)</text>

  <!-- 5. Discord Bot -> REST -> Express -->
  <path class="solid-arrow" d="M 620 270 L 540 270" />
  <path class="solid-arrow" d="M 540 270 L 550 265 M 540 270 L 550 275" /> <!-- Arrowhead -->
  <text class="label-text" x="550" y="265">HTTP GET</text>

  <!-- 6. Express -> Webhook -> Discord Guild -->
  <path class="conn-arrow" d="M 470 360 L 470 385 Q 470 395 490 395 L 750 395 Q 770 395 770 380 L 770 330" />
  <path class="solid-arrow" d="M 770 330 L 765 340 M 770 330 L 775 340" />
  <text class="label-text" x="550" y="390">Proactive Webhook Alerts (New anomalies)</text>

  <!-- 7. Gemini AI connections -->
  <path class="solid-arrow" d="M 430 360 L 430 410" />
  <path class="solid-arrow" d="M 430 410 L 425 400 M 430 410 L 435 400" />
  <text class="label-text" x="435" y="380">System Prompt</text>
  
  <path class="solid-arrow" d="M 620 300 L 490 300 L 490 410" />
  <path class="solid-arrow" d="M 490 410 L 485 400 M 490 410 L 495 400" />
  <text class="label-text" x="500" y="295">AI query for bot replies</text>
</svg>
